; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:adafruit_feather_esp32s3]
platform  = espressif32
board     = adafruit_feather_esp32s3
framework = arduino

; Libraries — PlatformIO will download these automatically on first build
lib_deps =
    ZinggJM/GxEPD2
    adafruit/Adafruit GFX Library
    adafruit/Adafruit BusIO
    adafruit/Adafruit NeoPixel

; Required for Serial to map to the native USB-CDC port on the ESP32-S3,
; not to UART0 (which has no physical connector on this board).
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DEPD_BUSY_WAIT_MS=500

monitor_speed = 115200
